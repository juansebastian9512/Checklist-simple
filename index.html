<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Checklist & To-Do List</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Una aplicación de checklist moderna, responsiva y minimalista para gestionar tus tareas diarias de forma eficiente.">
  
  <!-- Fontshare for Satoshi and Geist Mono -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,900&f[]=geist-mono@300,400,500,600,700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind custom configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Satoshi"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            mono: ['"Geist Mono"', 'monospace'],
          },
        },
      },
    }
  </script>

  <!-- Custom CSS for animations and custom styling -->
  <style>
    /* Custom scrollbar for warm charcoal theme */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #141413;
    }
    ::-webkit-scrollbar-thumb {
      background: #2D2D2A;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4E4E4A;
    }

    /* Keyframes for list animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .animate-scale-in {
      animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-[#141413] text-[#E5E5E3] font-sans antialiased flex flex-col selection:bg-white/10 selection:text-white">

  <!-- Core Layout Wrapper -->
  <div class="flex-grow flex flex-col justify-between max-w-3xl w-full mx-auto px-6 py-12 md:py-20">
    
    <!-- Main Content Area -->
    <main class="space-y-8 animate-slide-up">
      
      <!-- App Header -->
      <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 border-b border-[#2D2D2A] pb-8">
        <div>
          <div class="flex items-center gap-3">
            <span class="inline-flex items-center justify-center p-2 rounded-lg bg-[#1E1E1C] border border-[#2D2D2A]">
              <!-- App Icon (List check symbol) -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#E5E5E3]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
              </svg>
            </span>
            <h1 class="text-2xl font-bold tracking-tight text-[#E5E5E3]">TaskFlow</h1>
          </div>
          <p class="text-sm text-[#8E8D8A] mt-2">Organiza tus tareas con una interfaz limpia, persistente y moderna.</p>
        </div>
        
        <!-- Stats Summary -->
        <div class="flex gap-2 self-start md:self-auto text-xs font-semibold">
          <div class="px-3 py-2 bg-[#1E1E1C] border border-[#2D2D2A] rounded-lg flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-[#8E8D8A]"></span>
            <span class="text-[#8E8D8A]">Pendientes:</span>
            <span id="stat-pending" class="text-[#E5E5E3] font-mono">0</span>
          </div>
          <div class="px-3 py-2 bg-[#222019] border border-[#E5B842]/20 rounded-lg flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-[#E5B842]"></span>
            <span class="text-[#8E8D8A]">En Progreso:</span>
            <span id="stat-progress" class="text-[#E5B842] font-mono">0</span>
          </div>
          <div class="px-3 py-2 bg-[#171C18] border border-[#4E9A60]/20 rounded-lg flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-[#4E9A60]"></span>
            <span class="text-[#8E8D8A]">Completas:</span>
            <span id="stat-completed" class="text-[#4E9A60] font-mono">0</span>
          </div>
        </div>
      </header>

      <!-- Input Form -->
      <section class="bg-[#1C1C1A] border border-[#2D2D2A] rounded-xl p-6 relative overflow-hidden">
        <form id="add-task-form" class="space-y-4 relative z-10">
          <label for="task-input" class="block text-xs font-semibold uppercase tracking-wider text-[#8E8D8A]">¿Qué necesitas hacer hoy?</label>
          <div class="flex flex-col sm:flex-row gap-3">
            <input 
              type="text" 
              id="task-input" 
              placeholder="Ej. Redactar el informe de ventas trimestrales..." 
              required
              class="w-full bg-[#141413] border border-[#2D2D2A] focus:border-[#4E4E4A] focus:ring-0 rounded-lg px-4 py-3 text-[#E5E5E3] placeholder-[#60605C] focus:outline-none transition-all flex-grow font-sans text-sm"
            >
            <button 
              type="submit" 
              class="bg-[#E5E5E3] hover:bg-[#C8C8C5] active:scale-98 transition-all text-[#141413] font-semibold px-5 py-3 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap text-sm"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
              </svg>
              <span>Añadir Tarea</span>
            </button>
          </div>
        </form>
      </section>

      <!-- Main Controls and List -->
      <section class="space-y-6">
        <!-- Tabs & Filters -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-[#2D2D2A] pb-3">
          <!-- Tab Navigation -->
          <nav class="flex gap-1" aria-label="Tabs de tareas">
            <button 
              data-tab="todas" 
              id="tab-todas"
              class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-all duration-200 flex items-center gap-2 border border-transparent"
            >
              <span>Todas</span>
              <span id="badge-todas" class="text-xs font-mono px-2 py-0.5 rounded">0</span>
            </button>
            <button 
              data-tab="en_proceso" 
              id="tab-en_proceso"
              class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-all duration-200 flex items-center gap-2 border border-transparent text-[#8E8D8A] hover:text-[#E5E5E3] hover:bg-[#1E1E1C]/50"
            >
              <span>En Progreso</span>
              <span id="badge-en_proceso" class="text-xs font-mono px-2 py-0.5 rounded">0</span>
            </button>
            <button 
              data-tab="completadas" 
              id="tab-completadas"
              class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-all duration-200 flex items-center gap-2 border border-transparent text-[#8E8D8A] hover:text-[#E5E5E3] hover:bg-[#1E1E1C]/50"
            >
              <span>Completadas</span>
              <span id="badge-completadas" class="text-xs font-mono px-2 py-0.5 rounded">0</span>
            </button>
          </nav>

          <!-- Clear Completed / Reset Panel -->
          <button 
            id="clear-completed-btn" 
            class="text-xs font-semibold text-[#8E8D8A] hover:text-[#F18F8F] transition-colors flex items-center gap-1.5 self-end sm:self-auto px-2.5 py-1.5 rounded-md hover:bg-[#F18F8F]/10 border border-transparent hover:border-[#F18F8F]/20"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            <span>Limpiar completadas</span>
          </button>
        </div>

        <!-- Task List Container -->
        <div id="task-list" class="space-y-3 min-h-[150px]">
          <!-- Task items will be inserted here dynamically -->
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="mt-16 pt-6 border-t border-[#2D2D2A] text-center text-xs text-[#60605C] font-mono">
      <p>desarrollado usando vibecoding en antigravity</p>
    </footer>
  </div>

  <!-- JavaScript Application Logic -->
  <script>
    /**
     * @typedef {Object} Task
     * @property {string} id - Identificador único de la tarea.
     * @property {string} text - Texto descriptivo de la tarea.
     * @property {'pendiente'|'en_proceso'|'terminada'} status - Estado actual.
     * @property {number} createdAt - Marca de tiempo de creación.
     */

    // --- State Variables ---
    /** @type {Task[]} Listado de todas las tareas */
    let tasks = [];
    /** @type {'todas'|'en_proceso'|'terminada'} Filtro de pestaña activo */
    let currentFilter = 'todas';

    // --- DOM Elements ---
    const addForm = document.getElementById('add-task-form');
    const taskInput = document.getElementById('task-input');
    const taskListContainer = document.getElementById('task-list');
    const tabs = document.querySelectorAll('[data-tab]');
    const clearBtn = document.getElementById('clear-completed-btn');

    // Counts elements
    const statPending = document.getElementById('stat-pending');
    const statProgress = document.getElementById('stat-progress');
    const statCompleted = document.getElementById('stat-completed');
    const badgeTodas = document.getElementById('badge-todas');
    const badgeEnProceso = document.getElementById('badge-en_proceso');
    const badgeCompletadas = document.getElementById('badge-completadas');

    // --- Functions ---

    /**
     * Carga las tareas guardadas en LocalStorage.
     * Si no existen, inicializa con una lista vacía.
     */
    function loadTasks() {
      try {
        const stored = localStorage.getItem('taskflow_tasks');
        tasks = stored ? JSON.parse(stored) : getDemoTasks();
      } catch (e) {
        console.error('Error cargando datos de LocalStorage. Se usarán datos por defecto.', e);
        tasks = getDemoTasks();
      }
    }

    /**
     * Guarda la lista actual de tareas en LocalStorage.
     */
    function saveTasks() {
      try {
        localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
      } catch (e) {
        console.error('No se pudo guardar la lista de tareas en LocalStorage.', e);
      }
    }

    /**
     * Genera tareas iniciales de demostración para una primera carga agradable.
     * @returns {Task[]}
     */
    function getDemoTasks() {
      return [
        { id: 'demo-1', text: 'Diseñar la interfaz de usuario en modo oscuro', status: 'terminada', createdAt: Date.now() - 600000 },
        { id: 'demo-2', text: 'Implementar lógica de estados y LocalStorage', status: 'en_proceso', createdAt: Date.now() - 300000 },
        { id: 'demo-3', text: 'Realizar pruebas de responsividad en móviles', status: 'pendiente', createdAt: Date.now() }
      ];
    }

    /**
     * Agrega una nueva tarea a la lista.
     * @param {string} text - Contenido de la tarea.
     */
    function addTask(text) {
      const trimmedText = text.trim();
      if (!trimmedText) return;

      const newTask = {
        id: 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
        text: trimmedText,
        status: 'pendiente', // Por defecto, entra en Pendiente
        createdAt: Date.now()
      };

      tasks.unshift(newTask); // Añadir al inicio para mayor visibilidad
      saveTasks();
      incrementActionCounter();
      render();
    }

    /**
     * Elimina una tarea por su ID.
     * @param {string} id - El identificador único de la tarea.
     */
    function deleteTask(id) {
      // Filtrar y omitir la tarea eliminada
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      render();
    }

    /**
     * Actualiza el estado de una tarea específica.
     * Si la pestaña activa es restrictiva (como 'en_proceso' o 'completadas'),
     * la tarea cambiará y desaparecerá del render con una suave transición.
     * @param {string} id - ID de la tarea.
     * @param {'pendiente'|'en_proceso'|'terminada'} newStatus - Nuevo estado asignado.
     */
    function updateTaskStatus(id, newStatus) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return { ...task, status: newStatus };
        }
        return task;
      });

      saveTasks();
      incrementActionCounter();
      render();
    }

    /**
     * Incrementa el contador de acciones en LocalStorage y ejecuta la descarga de respaldo
     * cuando se alcanzan exactamente 5 acciones.
     */
    function incrementActionCounter() {
      let count = parseInt(localStorage.getItem('taskflow_action_count') || '0', 10);
      count++;
      if (count === 5) {
        downloadBackup();
        count = 0;
      }
      localStorage.setItem('taskflow_action_count', count.toString());
    }

    /**
     * Genera y descarga el archivo respaldo_tareas.json con las tareas actuales,
     * e inicia la notificación visual en pantalla.
     */
    function downloadBackup() {
      const dataStr = JSON.stringify(tasks, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'respaldo_tareas.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      
      showBackupNotification();
    }

    /**
     * Muestra una notificación temporal en pantalla de Tailwind CSS por 2 segundos.
     */
    function showBackupNotification() {
      const toast = document.createElement('div');
      toast.className = "fixed bottom-6 right-6 z-50 flex items-center gap-2 bg-[#E5E5E3] text-[#141413] font-bold px-4 py-3 rounded-lg border border-[#C8C8C5] shadow-sm transition-all duration-300 transform translate-y-10 opacity-0 text-sm";
      toast.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span>¡Copia de seguridad automática generada!</span>
      `;
      document.body.appendChild(toast);

      // Force layout reflow
      toast.offsetHeight;

      // Animate entry
      toast.classList.remove('translate-y-10', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      // Animate exit and remove
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => {
          if (toast.parentNode) {
            document.body.removeChild(toast);
          }
        }, 300);
      }, 2000);
    }

    /**
     * Calcula los contadores de tareas totales y por estado.
     */
    function updateCounts() {
      const pendingCount = tasks.filter(t => t.status === 'pendiente').length;
      const progressCount = tasks.filter(t => t.status === 'en_proceso').length;
      const completedCount = tasks.filter(t => t.status === 'terminada').length;
      const totalCount = tasks.length;

      // Stats Header Panel
      statPending.textContent = pendingCount;
      statProgress.textContent = progressCount;
      statCompleted.textContent = completedCount;

      // Tab badges
      badgeTodas.textContent = totalCount;
      badgeEnProceso.textContent = progressCount;
      badgeCompletadas.textContent = completedCount;
    }

    /**
     * Aplica los estilos activos a la pestaña seleccionada.
     */
    function updateActiveTabUI() {
      tabs.forEach(tab => {
        const tabVal = tab.getAttribute('data-tab');
        const badge = tab.querySelector('span:nth-child(2)');

        if (tabVal === currentFilter) {
          // Tab seleccionada (Active)
          tab.className = "px-4 py-2 text-sm font-semibold rounded-lg transition-all duration-200 flex items-center gap-2 border border-[#2D2D2A] bg-[#1E1E1C] text-[#E5E5E3]";
          if (badge) {
            badge.className = "text-xs px-2 py-0.5 rounded font-mono border " + 
              (currentFilter === 'en_proceso' ? "bg-[#E5B842]/10 border-[#E5B842]/20 text-[#E5B842]" : 
               currentFilter === 'completadas' ? "bg-[#4E9A60]/10 border-[#4E9A60]/20 text-[#4E9A60]" : 
               "bg-[#141413] border-[#2D2D2A] text-[#E5E5E3]");
          }
        } else {
          // Tab no seleccionada (Inactive)
          tab.className = "px-4 py-2 text-sm font-semibold rounded-lg transition-all duration-200 flex items-center gap-2 border border-transparent text-[#8E8D8A] hover:text-[#E5E5E3] hover:bg-[#1E1E1C]/50";
          if (badge) {
            badge.className = "text-xs bg-[#141413]/40 text-[#60605C] px-2 py-0.5 rounded border border-[#2D2D2A]/40 font-mono";
          }
        }
      });
    }

    /**
     * Renderiza el listado de tareas filtrado en el DOM.
     */
    function render() {
      // 1. Actualizar los contadores y las tabs
      updateCounts();
      updateActiveTabUI();

      // 2. Filtrar las tareas
      let filteredTasks = [...tasks];
      if (currentFilter === 'en_proceso') {
        filteredTasks = tasks.filter(t => t.status === 'en_proceso');
      } else if (currentFilter === 'completadas') {
        filteredTasks = tasks.filter(t => t.status === 'terminada');
      }

      // 3. Limpiar contenedor
      taskListContainer.innerHTML = '';

      // 4. Mostrar estado vacío si no hay tareas
      if (filteredTasks.length === 0) {
        taskListContainer.appendChild(createEmptyStateDOM());
        return;
      }

      // 5. Renderizar cada tarjeta de tarea
      filteredTasks.forEach(task => {
        taskListContainer.appendChild(createTaskCardDOM(task));
      });
    }

    /**
     * Crea el nodo DOM para el estado vacío.
     * @returns {HTMLElement}
     */
    function createEmptyStateDOM() {
      const div = document.createElement('div');
      div.className = "border border-dashed border-[#2D2D2A] rounded-xl p-10 flex flex-col items-center justify-center text-center space-y-4 animate-scale-in bg-[#1C1C1A]/20";
      
      let title = "No hay tareas pendientes";
      let subtitle = "¡Todo despejado! Añade una tarea arriba para empezar.";
      let iconColor = "text-[#60605C]";

      if (currentFilter === 'en_proceso') {
        title = "Ninguna tarea en proceso";
        subtitle = "Configura el estado de alguna tarea a 'En proceso' para verla aquí.";
        iconColor = "text-[#E5B842]/40";
      } else if (currentFilter === 'completadas') {
        title = "Sin tareas completadas";
        subtitle = "Completa tus actividades y verás tu historial aquí.";
        iconColor = "text-[#4E9A60]/40";
      }

      div.innerHTML = `
        <span class="inline-flex items-center justify-center p-3 rounded-lg bg-[#1E1E1C] border border-[#2D2D2A] ${iconColor}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0V9a2 2 0 00-2-2H6a2 2 0 00-2 2v2M4 18c0-.55.45-1 1-1h14c.55 0 1 .45 1 1s-.45 1-1 1H5c-.55 0-1-.45-1-1z" />
          </svg>
        </span>
        <div class="space-y-1">
          <h3 class="font-semibold text-[#E5E5E3] text-base">${title}</h3>
          <p class="text-xs text-[#8E8D8A] max-w-sm">${subtitle}</p>
        </div>
      `;
      return div;
    }

    /**
     * Genera la tarjeta de la tarea y asocia sus eventos.
     * @param {Task} task - Datos de la tarea.
     * @returns {HTMLElement}
     */
    function createTaskCardDOM(task) {
      const card = document.createElement('div');
      
      // Dynamic styles based on status (Utilitarian Warm Palette)
      let statusBorderColor = "border-[#2D2D2A]";
      let accentLeftBar = "bg-[#3A3A37]";
      let textStyle = "text-[#E5E5E3]";
      let bgStyle = "bg-[#1E1E1C]";
      let selectColors = "border-[#2D2D2A] text-[#8E8D8A] bg-[#141413] focus:border-[#4E4E4A]";

      if (task.status === 'en_proceso') {
        statusBorderColor = "border-[#E5B842]/20";
        accentLeftBar = "bg-[#E5B842]";
        bgStyle = "bg-[#222019] hover:bg-[#2A271E]";
        selectColors = "border-[#E5B842]/30 text-[#E5B842] bg-[#1D1B15] focus:border-[#E5B842]/60";
      } else if (task.status === 'terminada') {
        statusBorderColor = "border-[#4E9A60]/20";
        accentLeftBar = "bg-[#4E9A60]";
        textStyle = "line-through text-[#60605C] decoration-[#40403C]/80";
        bgStyle = "bg-[#171C18] opacity-70 hover:opacity-90";
        selectColors = "border-[#4E9A60]/30 text-[#4E9A60] bg-[#141915] focus:border-[#4E9A60]/60";
      } else {
        bgStyle = "bg-[#1E1E1C] hover:bg-[#242422]";
      }

      card.className = `group flex items-center justify-between gap-4 p-4 rounded-xl border ${statusBorderColor} ${bgStyle} transition-all duration-300 relative animate-scale-in`;
      
      // Dynamic accent line on the left of the card
      const leftIndicator = document.createElement('div');
      leftIndicator.className = `absolute left-0 top-0 bottom-0 w-1 ${accentLeftBar} transition-colors duration-300 rounded-l-xl`;
      card.appendChild(leftIndicator);

      // Card Inner Layout
      // 1. Text & Checkbox Indicator
      const infoContainer = document.createElement('div');
      infoContainer.className = "flex items-center gap-3 flex-grow min-w-0 pl-1";
      
      // Checkbox square/squirckle (styled indicator, clicking toggles between Pendiente / Terminada)
      const checkboxBtn = document.createElement('button');
      checkboxBtn.type = "button";
      checkboxBtn.className = `flex-shrink-0 w-6 h-6 rounded-md border flex items-center justify-center transition-all duration-200 ` + 
        (task.status === 'terminada' 
          ? "bg-[#4E9A60] border-[#4E9A60] text-[#141413] shadow-inner" 
          : task.status === 'en_proceso'
            ? "border-[#E5B842]/60 text-[#E5B842] hover:bg-[#E5B842]/10"
            : "border-[#2D2D2A] text-transparent hover:border-[#4E4E4A] hover:bg-[#1E1E1C]");
      
      checkboxBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
        </svg>
      `;

      checkboxBtn.addEventListener('click', () => {
        const nextStatus = task.status === 'terminada' ? 'pendiente' : 'terminada';
        updateTaskStatus(task.id, nextStatus);
      });
      infoContainer.appendChild(checkboxBtn);

      // Task Text
      const textSpan = document.createElement('span');
      textSpan.className = `text-sm font-medium transition-all duration-300 break-words line-clamp-2 md:line-clamp-none ${textStyle}`;
      textSpan.textContent = task.text;
      infoContainer.appendChild(textSpan);
      
      card.appendChild(infoContainer);

      // 2. Actions (Select Dropdown & Delete Button)
      const actionsContainer = document.createElement('div');
      actionsContainer.className = "flex items-center gap-3 flex-shrink-0";

      // Custom Dropdown Container
      const dropdownContainer = document.createElement('div');
      dropdownContainer.className = "relative custom-dropdown-container";

      // Determine label text
      let statusLabel = "Pendiente";
      if (task.status === 'en_proceso') statusLabel = "En proceso";
      else if (task.status === 'terminada') statusLabel = "Terminada";

      // Trigger Button
      const dropdownBtn = document.createElement('button');
      dropdownBtn.type = "button";
      dropdownBtn.className = `text-xs font-semibold rounded-lg px-2.5 py-1.5 focus:outline-none transition-all duration-200 cursor-pointer border flex items-center gap-1.5 ${selectColors}`;
      dropdownBtn.innerHTML = `
        <span>${statusLabel}</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-60 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      `;

      // Menu options container
      const dropdownMenu = document.createElement('div');
      dropdownMenu.className = "absolute right-0 mt-1 z-30 w-32 bg-[#1C1C1A] border border-[#2D2D2A] rounded-lg shadow-xl hidden flex-col py-1 custom-dropdown-menu";

      const options = [
        { value: 'pendiente', label: 'Pendiente' },
        { value: 'en_proceso', label: 'En proceso' },
        { value: 'terminada', label: 'Terminada' }
      ];

      options.forEach(opt => {
        const optBtn = document.createElement('button');
        optBtn.type = "button";
        optBtn.className = "w-full text-left px-3 py-1.5 text-xs transition-colors duration-150 " + 
          (task.status === opt.value 
            ? "text-[#E5E5E3] bg-[#242422] font-semibold" 
            : "text-[#8E8D8A] hover:text-[#E5E5E3] hover:bg-[#242422]/50");
        optBtn.textContent = opt.label;

        optBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdownMenu.classList.add('hidden');
          dropdownMenu.classList.remove('flex');
          updateTaskStatus(task.id, opt.value);
        });

        dropdownMenu.appendChild(optBtn);
      });

      dropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Close other open menus
        document.querySelectorAll('.custom-dropdown-menu').forEach(menu => {
          if (menu !== dropdownMenu) {
            menu.classList.add('hidden');
            menu.classList.remove('flex');
            const parentCard = menu.closest('.group');
            if (parentCard) parentCard.classList.remove('z-20');
          }
        });

        const isHidden = dropdownMenu.classList.contains('hidden');
        if (isHidden) {
          dropdownMenu.classList.remove('hidden');
          dropdownMenu.classList.add('flex');
          card.classList.add('z-20');
        } else {
          dropdownMenu.classList.add('hidden');
          dropdownMenu.classList.remove('flex');
          card.classList.remove('z-20');
        }
      });

      dropdownContainer.appendChild(dropdownBtn);
      dropdownContainer.appendChild(dropdownMenu);
      actionsContainer.appendChild(dropdownContainer);

      // Delete Button
      const deleteBtn = document.createElement('button');
      deleteBtn.type = "button";
      deleteBtn.className = "p-2 rounded-lg text-[#60605C] hover:text-[#F18F8F] hover:bg-[#F18F8F]/10 transition-all duration-200 opacity-80 hover:opacity-100";
      deleteBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      `;
      deleteBtn.addEventListener('click', () => {
        card.classList.add('opacity-0', 'scale-98');
        setTimeout(() => {
          deleteTask(task.id);
        }, 150);
      });
      actionsContainer.appendChild(deleteBtn);

      card.appendChild(actionsContainer);
      return card;
    }

    // --- Event Listeners ---

    // Submit form handler
    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      addTask(taskInput.value);
      taskInput.value = '';
    });

    // Tab buttons handlers
    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        const selectedTab = e.currentTarget.getAttribute('data-tab');
        currentFilter = selectedTab;
        render();
      });
    });

    // Clear completed tasks
    clearBtn.addEventListener('click', () => {
      const completedTasks = tasks.filter(t => t.status === 'terminada');
      if (completedTasks.length === 0) return;
      
      if (confirm(`¿Estás seguro de que deseas eliminar las ${completedTasks.length} tareas completadas?`)) {
        tasks = tasks.filter(t => t.status !== 'terminada');
        saveTasks();
        render();
      }
    });

    // Close custom dropdowns when clicking outside
    document.addEventListener('click', () => {
      document.querySelectorAll('.custom-dropdown-menu').forEach(menu => {
        menu.classList.add('hidden');
        menu.classList.remove('flex');
        const parentCard = menu.closest('.group');
        if (parentCard) parentCard.classList.remove('z-20');
      });
    });

    // --- App Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
      loadTasks();
      render();
    });
  </script>
</body>
</html>
