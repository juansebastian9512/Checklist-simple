    body {
      font-family: 'Hanken Grotesk', sans-serif;
      background-color: #0c112b;
      color: #dee1ff;
      overflow-x: hidden;
    }
    .kanban-container {
      height: calc(100vh - 64px);
      scrollbar-width: thin;
      scrollbar-color: #474555 transparent;
    }
    /* Responsive adjustment for mobile when tabs are active */
    @media (max-width: 767px) {
      .kanban-container {
        height: calc(100vh - 114px);
      }
    }
    .kanban-container::-webkit-scrollbar {
      height: 8px;
      width: 6px;
    }
    .kanban-container::-webkit-scrollbar-thumb {
      background: #474555;
      border-radius: 4px;
    }
    .kanban-container::-webkit-scrollbar-track {
      background: #070c26;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    /* Animations */
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .animate-scale-in {
      animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>

  <script>
    /**
     * @typedef {Object} Task
     * @property {string} id - Identificador único de la tarea.
     * @property {string} text - Título de la tarea.
     * @property {string} description - Descripción detallada.
     * @property {'baja'|'normal'|'urgente'} priority - Nivel de prioridad.
     * @property {string} dueDate - Fecha de vencimiento.
     * @property {'pendiente'|'en_proceso'|'terminada'} status - Estado actual.
     * @property {number} createdAt - Marca de tiempo de creación.
     */

    // --- State Variables ---
    /** @type {Task[]} Listado de todas las tareas */
    let tasks = [];
    
    // Tracks current search term
    let currentSearchQuery = '';
    
    // Active mobile column tab
    let activeMobileTab = 'todas';

    // --- DOM Elements ---
    const searchInput = document.getElementById('search-input');
    const listPendiente = document.getElementById('list-pendiente');
    const listEnProceso = document.getElementById('list-en_proceso');
    const listCompletada = document.getElementById('list-completada');

    // Counts elements
    const statPending = document.getElementById('stat-pending');
    const statProgress = document.getElementById('stat-progress');
    const statCompleted = document.getElementById('stat-completed');
    
    const countPendiente = document.getElementById('col-count-pendiente');
    const countEnProceso = document.getElementById('col-count-en-proceso');
    const countCompletado = document.getElementById('col-count-completado');

    // --- Functions ---

    /**
     * Carga las tareas guardadas en LocalStorage y migra el formato viejo.
     */
    function loadTasks() {
      try {
        const stored = localStorage.getItem('taskflow_tasks');
        const rawTasks = stored ? JSON.parse(stored) : getDemoTasks();
        
        // Migrate formats transparently
        tasks = rawTasks.map(t => ({
          id: t.id || 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
          text: t.text || '',
          description: t.description || '',
          priority: t.priority || 'normal',
          dueDate: t.dueDate || '',
          status: t.status === 'terminada' || t.status === 'completada' ? 'terminada' : (t.status === 'en_proceso' ? 'en_proceso' : 'pendiente'),
          createdAt: t.createdAt || Date.now()
        }));
      } catch (e) {
        console.error('Error cargando datos de LocalStorage. Se usarán datos por defecto.', e);
        tasks = getDemoTasks();
      }
    }

    /**
     * Guarda la lista actual de tareas en LocalStorage.
     */
    function saveTasks() {
      try {
        localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
      } catch (e) {
        console.error('No se pudo guardar la lista de tareas en LocalStorage.', e);
      }
    }

    /**
     * Genera tareas iniciales de demostración para una primera carga agradable.
     * @returns {Task[]}
     */
    function getDemoTasks() {
      const today = new Date().toISOString().split('T')[0];
      return [
        { 
          id: 'demo-1', 
          text: 'Diseñar la interfaz de usuario en modo oscuro', 
          description: 'Crear el diseño del Kanban usando la paleta de colores de stitch y tipografía Hanken Grotesk.',
          priority: 'urgente',
          dueDate: today,
          status: 'terminada', 
          createdAt: Date.now() - 600000 
        },
        { 
          id: 'demo-2', 
          text: 'Implementar lógica de estados y LocalStorage', 
          description: 'Soportar el guardado automático del estado de las tareas y migrar los datos viejos de forma transparente.',
          priority: 'normal',
          dueDate: today,
          status: 'en_proceso', 
          createdAt: Date.now() - 300000 
        },
        { 
          id: 'demo-3', 
          text: 'Realizar pruebas de responsividad en móviles', 
          description: 'Revisar la visualización del scroll horizontal en pantallas pequeñas y la interacción touch.',
          priority: 'baja',
          dueDate: '',
          status: 'pendiente', 
          createdAt: Date.now() 
        }
      ];
    }

    /**
     * Agrega una nueva tarea a la lista.
     * @param {string} text - Contenido de la tarea.
     */
    function addTask(text) {
      const trimmedText = text.trim();
      if (!trimmedText) return;

      const newTask = {
        id: 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
        text: trimmedText,
        description: '',
        priority: 'normal',
        dueDate: '',
        status: 'pendiente',
        createdAt: Date.now()
      };

      tasks.unshift(newTask);
      saveTasks();
      incrementActionCounter();
      render();
    }

    /**
     * Elimina una tarea por su ID.
     * @param {string} id - El identificador único de la tarea.
     */
    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      incrementActionCounter();
      render();
    }

    /**
     * Actualiza el estado de una tarea específica.
     * @param {string} id - ID de la tarea.
     * @param {'pendiente'|'en_proceso'|'terminada'} newStatus - Nuevo estado asignado.
     */
    function updateTaskStatus(id, newStatus) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return { ...task, status: newStatus };
        }
        return task;
      });

      saveTasks();
      incrementActionCounter();
      render();
    }

    /**
     * Incrementa el contador de acciones en LocalStorage y ejecuta la descarga de respaldo
     * cuando se alcanzan exactamente 5 acciones.
     */
    function incrementActionCounter() {
      let count = parseInt(localStorage.getItem('taskflow_action_count') || '0', 10);
      count++;
      if (count === 5) {
        downloadBackup();
        count = 0;
      }
      localStorage.setItem('taskflow_action_count', count.toString());
    }

    /**
     * Genera y descarga el archivo respaldo_tareas.json con las tareas actuales.
     */
    function downloadBackup() {
      const dataStr = JSON.stringify(tasks, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'respaldo_tareas.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      
      showBackupNotification();
    }

    /**
     * Muestra una notificación temporal en pantalla con la estética del sistema de diseño.
     */
    function showBackupNotification() {
      const toast = document.createElement('div');
      toast.className = "fixed bottom-8 right-8 z-50 flex items-center gap-3 bg-surface-container-lowest text-on-surface font-bold px-5 py-4 rounded-xl border border-primary shadow-[0_0_30px_rgba(55,17,191,0.3)] transition-all duration-300 transform translate-y-10 opacity-0 text-sm";
      toast.innerHTML = `
        <div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
          <span class="material-symbols-outlined text-[20px]">cloud_done</span>
        </div>
        <div class="flex flex-col">
          <span class="font-bold text-on-surface">Copia de seguridad</span>
          <span class="text-xs font-normal text-on-surface-variant">¡Copia de seguridad automática generada!</span>
        </div>
      `;
      document.body.appendChild(toast);

      // Force layout reflow
      toast.offsetHeight;

      // Animate entry
      toast.classList.remove('translate-y-10', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      // Animate exit and remove
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => {
          if (toast.parentNode) {
            document.body.removeChild(toast);
          }
        }, 300);
      }, 3000);
    }

    /**
     * Calcula los contadores de tareas totales y por estado.
     */
    function updateCounts() {
      const pendingCount = tasks.filter(t => t.status === 'pendiente').length;
      const progressCount = tasks.filter(t => t.status === 'en_proceso').length;
      const completedCount = tasks.filter(t => t.status === 'terminada').length;

      // Stats Header Panel
      if (statPending) statPending.textContent = pendingCount;
      if (statProgress) statProgress.textContent = progressCount;
      if (statCompleted) statCompleted.textContent = completedCount;

      // Column count badges
      if (countPendiente) countPendiente.textContent = pendingCount;
      if (countEnProceso) countEnProceso.textContent = progressCount;
      if (countCompletado) countCompletado.textContent = completedCount;
    }

    /**
     * Escapa caracteres HTML para evitar XSS.
     */
    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag)
      );
    }

    /**
     * Crea la tarjeta de la tarea y asocia sus eventos.
     * @param {Task} task - Datos de la tarea.
     * @returns {HTMLElement}
     */
    function createTaskCardDOM(task) {
      let accentClass = 'bg-secondary';
      
      if (task.status === 'terminada') {
        accentClass = 'bg-tertiary';
      } else if (task.status === 'en_proceso') {
        accentClass = 'bg-primary';
      } else {
        if (task.priority === 'urgente') accentClass = 'bg-[#F24B4B]';
        else if (task.priority === 'baja') accentClass = 'bg-outline';
      }

      // Priority labels
      let priorityLabel = 'Normal';
      let priorityBadgeClass = 'bg-secondary-container text-on-secondary-container';
      if (task.priority === 'urgente') {
        priorityLabel = 'Urgente';
        priorityBadgeClass = 'bg-[#840011] text-[#ff8881] border border-[#ff8881]/20';
      } else if (task.priority === 'baja') {
        priorityLabel = 'Baja';
        priorityBadgeClass = 'bg-surface-container-highest text-on-surface-variant';
      }

      // Date indicator
      let dateHtml = '';
      if (task.dueDate) {
        const dateObj = new Date(task.dueDate + 'T00:00:00');
        const formattedDate = dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
        dateHtml = `
          <div class="flex items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined text-[16px]">calendar_today</span>
            <span class="text-xs font-semibold">${formattedDate}</span>
          </div>
        `;
      } else if (task.status === 'terminada') {
        dateHtml = `
          <div class="flex items-center gap-1 text-tertiary">
            <span class="material-symbols-outlined text-[16px]">check_circle</span>
            <span class="text-xs font-semibold">Finalizado</span>
          </div>
        `;
      }

      const descHtml = task.description 
        ? `<p class="text-label-sm text-on-surface-variant line-clamp-2">${escapeHTML(task.description)}</p>` 
        : '';

      const card = document.createElement('div');
      card.className = `bg-surface-container-high p-4 rounded-xl relative overflow-hidden group cursor-grab active:cursor-grabbing border border-outline-variant hover:border-primary/50 transition-all select-none`;
      card.setAttribute('draggable', 'true');
      card.setAttribute('ondragstart', 'drag(event)');
      card.setAttribute('ondragend', 'dragEnd(event)');
      card.setAttribute('onclick', `openEditModal("${task.id}", event)`);
      card.dataset.id = task.id;

      const titleClass = task.status === 'terminada' 
        ? 'font-body-md text-body-md font-bold text-on-surface-variant line-through opacity-60' 
        : 'font-body-md text-body-md font-bold text-on-surface';

      card.innerHTML = `
        <div class="absolute left-0 top-0 bottom-0 w-1 ${accentClass}"></div>
        <div class="flex flex-col gap-2.5">
          <div class="flex justify-between items-start">
            <span class="${priorityBadgeClass} text-label-sm px-2 py-0.5 rounded font-semibold">${priorityLabel}</span>
            <button onclick="openEditModal('${task.id}', event)" class="opacity-0 group-hover:opacity-100 text-on-surface-variant hover:text-on-surface transition-opacity p-1 rounded hover:bg-surface-container-highest">
              <span class="material-symbols-outlined text-[16px]">edit</span>
            </button>
          </div>
          <h3 class="${titleClass}">${escapeHTML(task.text)}</h3>
          ${descHtml}
          <div class="flex justify-between items-center mt-1">
            ${dateHtml}
            <div class="flex -space-x-1.5">
              <img alt="Avatar" class="w-6 h-6 rounded-full border-2 border-surface-container-high" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvSZW7VhwCWctmMXa5RDL8zlL2q7SDjDxMmvysu7gsUh7YX6nu5c5fnUk1TSbTQKWdEgqmeA5bhI-enXzTjcGtO_FO8MKP_2gt83Jl9dz1XAsrSF9TmuLUNmzYNGGpJaJbGQgzoX02OUqHOnuk905NVgPvf5akCzj7JkMhmbZoPxzBFcVFghtrJzqhYpJIJ78Nnd0cPFNGPvJi-YzRpWSSrExHZOGUenbxpCLO-IxTJ96LjifwY5eNd-75OrYwXAI6OT20AGKCico"/>
            </div>
          </div>
        </div>
      `;

      // Micro-interactions
      card.addEventListener('mouseenter', () => {
        card.style.transform = 'translateY(-2px)';
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = 'translateY(0)';
      });

      return card;
    }

    /**
     * Renderiza el listado de tareas en sus respectivas columnas.
     */
    function render() {
      // 1. Limpiar contenedores
      listPendiente.innerHTML = '';
      listEnProceso.innerHTML = '';
      listCompletada.innerHTML = '';

      // 2. Filtrar por búsqueda
      let filteredTasks = [...tasks];
      if (currentSearchQuery.trim()) {
        const query = currentSearchQuery.toLowerCase();
        filteredTasks = tasks.filter(t => 
          t.text.toLowerCase().includes(query) || 
          t.description.toLowerCase().includes(query)
        );
      }

      // 3. Renderizar cada tarjeta
      let counts = { pendiente: 0, en_proceso: 0, terminada: 0 };
      
      filteredTasks.forEach(task => {
        const cardDOM = createTaskCardDOM(task);
        if (task.status === 'pendiente') {
          listPendiente.appendChild(cardDOM);
          counts.pendiente++;
        } else if (task.status === 'en_proceso') {
          listEnProceso.appendChild(cardDOM);
          counts.en_proceso++;
        } else {
          listCompletada.appendChild(cardDOM);
          counts.terminada++;
        }
      });

      // 4. Mostrar estado vacío local si no hay tareas en una columna
      ['pendiente', 'en_proceso', 'completada'].forEach(col => {
        const list = col === 'pendiente' ? listPendiente : (col === 'en_proceso' ? listEnProceso : listCompletada);
        const statusKey = col === 'completada' ? 'terminada' : col;
        
        if (list.children.length === 0) {
          list.appendChild(createEmptyColDOM(statusKey));
        }
      });

      // 5. Actualizar contadores globales y locales
      updateCounts();
    }

    /**
     * Crea la vista de columna vacía.
     */
    function createEmptyColDOM(status) {
      const div = document.createElement('div');
      div.className = "border border-dashed border-outline-variant/30 rounded-xl p-6 flex flex-col items-center justify-center text-center space-y-2 opacity-40 select-none pointer-events-none py-10";
      
      let title = "Columna vacía";
      let icon = "assignment";
      
      if (status === 'en_proceso') {
        title = "Sin progreso";
        icon = "rotate_right";
      } else if (status === 'terminada') {
        title = "Ninguna completada";
        icon = "check_circle_outline";
      }

      div.innerHTML = `
        <span class="material-symbols-outlined text-[32px]">${icon}</span>
        <span class="text-xs font-semibold">${title}</span>
      `;
      return div;
    }

    // --- Modal Logic ---

    function openCreateModal(status = 'pendiente', event) {
      if (event) event.stopPropagation();

      document.getElementById('modal-title').textContent = 'Añadir Nueva Tarea';
      
      document.getElementById('modal-task-id').value = '';
      document.getElementById('task-input').value = '';
      document.getElementById('modal-task-desc').value = '';
      document.getElementById('modal-task-priority').value = 'normal';
      document.getElementById('modal-task-date').value = '';
      
      document.getElementById('modal-task-status').value = status;
      document.getElementById('modal-task-status-select').value = status;
      
      document.getElementById('modal-delete-btn').classList.add('hidden');
      document.getElementById('modal-delete-btn').classList.remove('flex');
      document.getElementById('modal-delete-spacer').classList.remove('hidden');
      
      const modal = document.getElementById('task-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      
      // Focus on title input
      setTimeout(() => document.getElementById('task-input').focus(), 50);
    }

    function openEditModal(taskId, event) {
      if (event) event.stopPropagation();
      
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      document.getElementById('modal-title').textContent = 'Editar Tarea';
      
      document.getElementById('modal-task-id').value = task.id;
      document.getElementById('task-input').value = task.text;
      document.getElementById('modal-task-desc').value = task.description || '';
      document.getElementById('modal-task-priority').value = task.priority || 'normal';
      document.getElementById('modal-task-date').value = task.dueDate || '';
      
      document.getElementById('modal-task-status').value = task.status;
      document.getElementById('modal-task-status-select').value = task.status;
      
      document.getElementById('modal-delete-btn').classList.remove('hidden');
      document.getElementById('modal-delete-btn').classList.add('flex');
      document.getElementById('modal-delete-spacer').classList.add('hidden');
      
      const modal = document.getElementById('task-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('task-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function handleModalSubmit(event) {
      event.preventDefault();
      
      const id = document.getElementById('modal-task-id').value;
      const text = document.getElementById('task-input').value.trim();
      const description = document.getElementById('modal-task-desc').value.trim();
      const priority = document.getElementById('modal-task-priority').value;
      const dueDate = document.getElementById('modal-task-date').value;
      const status = document.getElementById('modal-task-status-select').value;
      
      if (!text) return;
      
      if (id) {
        // Edit Mode
        tasks = tasks.map(t => {
          if (t.id === id) {
            return {
              ...t,
              text,
              description,
              priority,
              dueDate,
              status
            };
          }
          return t;
        });
      } else {
        // Create Mode
        const newTask = {
          id: 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
          text,
          description,
          priority,
          dueDate,
          status,
          createdAt: Date.now()
        };
        tasks.unshift(newTask);
      }
      
      saveTasks();
      incrementActionCounter();
      closeModal();
      render();
    }

    function handleModalDelete() {
      const id = document.getElementById('modal-task-id').value;
      if (!id) return;
      
      if (confirm('¿Estás seguro de que deseas eliminar esta tarea?')) {
        deleteTask(id);
        closeModal();
      }
    }

    // --- Search Logic ---
    function handleSearch() {
      currentSearchQuery = searchInput.value;
      render();
    }

    // --- Clear Completed Logic ---
    function clearCompleted() {
      const completedTasks = tasks.filter(t => t.status === 'terminada');
      if (completedTasks.length === 0) {
        alert('No hay tareas completadas para limpiar.');
        return;
      }
      
      if (confirm(`¿Estás seguro de que deseas eliminar las ${completedTasks.length} tareas completadas?`)) {
        tasks = tasks.filter(t => t.status !== 'terminada');
        saveTasks();
        incrementActionCounter();
        render();
      }
    }

    // --- Responsive Sidebar ---
    function toggleSidebar() {
      const sidebar = document.querySelector('aside');
      sidebar.classList.toggle('-translate-x-full');
    }

    // --- Mobile Column Swapping ---
    function switchMobileTab(tab) {
      activeMobileTab = tab;
      
      const tabs = ['todas', 'pendiente', 'en_proceso', 'completada'];
      tabs.forEach(t => {
        const btn = document.getElementById(`mob-tab-${t}`);
        if (!btn) return;
        if (t === tab) {
          btn.className = "px-3.5 py-2 text-xs font-semibold rounded-lg bg-primary-container text-on-primary-container border border-primary/20 whitespace-nowrap";
        } else {
          btn.className = "px-3.5 py-2 text-xs font-semibold rounded-lg text-on-surface-variant hover:text-on-surface border border-transparent whitespace-nowrap";
        }
      });
      
      const colPendiente = document.getElementById('col-pendiente');
      const colEnProceso = document.getElementById('col-en_proceso');
      const colCompletada = document.getElementById('col-completada');
      
      if (tab === 'todas') {
        colPendiente.classList.remove('hidden');
        colEnProceso.classList.remove('hidden');
        colCompletada.classList.remove('hidden');
      } else {
        colPendiente.classList.toggle('hidden', tab !== 'pendiente');
        colEnProceso.classList.toggle('hidden', tab !== 'en_proceso');
        colCompletada.classList.toggle('hidden', tab !== 'completada');
      }
    }

    // --- Native Drag & Drop Mechanics ---
    function drag(ev) {
      ev.dataTransfer.setData("text/plain", ev.currentTarget.dataset.id);
      ev.currentTarget.classList.add('opacity-40');
      ev.currentTarget.classList.add('scale-95');
    }

    function dragEnd(ev) {
      ev.currentTarget.classList.remove('opacity-40');
      ev.currentTarget.classList.remove('scale-95');
    }

    function allowDrop(ev) {
      ev.preventDefault();
      // Target the dropzone list container
      const container = ev.currentTarget;
      container.classList.add('bg-surface-container-high');
    }

    function dragLeave(ev) {
      const container = ev.currentTarget;
      container.classList.remove('bg-surface-container-high');
    }

    function drop(ev) {
      ev.preventDefault();
      const container = ev.currentTarget;
      container.classList.remove('bg-surface-container-high');
      
      const id = ev.dataTransfer.getData("text/plain");
      const newStatus = container.dataset.status;
      
      const task = tasks.find(t => t.id === id);
      if (task && task.status !== newStatus) {
        task.status = newStatus;
        saveTasks();
        incrementActionCounter();
        render();
      }
    }

    // Close custom dropdowns and modals on external click
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('task-modal');
      if (e.target === modal) {
        closeModal();
      }
    });

    // Handle horizontal mouse wheel scrolling in container
    document.querySelector('.kanban-container').addEventListener('wheel', (evt) => {
      // Horizontal scroll on desktop with wheel only if viewport is wide enough to scroll
      if (evt.deltaY !== 0 && window.innerWidth >= 768) {
        evt.preventDefault();
        document.querySelector('.kanban-container').scrollLeft += evt.deltaY;
      }
    });

    // --- App Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
      loadTasks();
      render();
      
      // Default mobile layout settings
      if (window.innerWidth < 768) {
        switchMobileTab('todas');
      }
    });
  </script>
</body>
</html>
